<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>越南極簡旅行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { background-color: #F5F5DC; color: #2D5A27; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 6px solid #FFB800; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: #2D5A27; color: white; padding: 10px 18px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .tag-food { background: #FF7043; color: white; }
        .tag-site { background: #4DB6AC; color: white; }
    </style>
</head>
<body class="p-5 pb-24">
    <header class="mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Xin Chào!</h1>
            <p class="text-gray-500 font-medium">河內 · 2026/04/15</p>
        </div>
        <div class="text-right">
            <p class="text-2xl font-bold text-[#FFB800]">28°C</p>
            <p class="text-xs font-bold opacity-60">晴時多雲</p>
        </div>
    </header>

    <section>
        <div class="card">
            <div class="flex justify-between items-start mb-3">
                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tag-food">必吃美食</span>
                <span class="text-gray-400 text-xs">預約號: #VN992</span>
            </div>
            <h3 class="text-xl font-bold mb-1">Phở Thìn 13 Lò Đúc</h3>
            <p class="text-sm text-gray-500 leading-relaxed mb-4">這家是河內傳奇，**生滾牛肉河粉**湯頭濃郁，記得加點**油條**沾著吃才道地！</p>
            <a href="https://www.google.com/maps/search/?api=1&query=Pho+Thin+13+Lo+Duc" class="nav-btn">
                📍 開啟自動導航
            </a>
        </div>

        <div class="card">
            <div class="flex justify-between items-start mb-3">
                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tag-site">必訪景點</span>
            </div>
            <h3 class="text-xl font-bold mb-1">聖若瑟主教座堂</h3>
            <p class="text-sm text-gray-500 leading-relaxed mb-4">法式建築極簡風，下午四點的光影最美，適合在對面咖啡廳點杯**雞蛋咖啡**看風景。</p>
            <a href="https://www.google.com/maps/search/?api=1&query=St.+Joseph's+Cathedral+Hanoi" class="nav-btn">
                📍 開啟自動導航
            </a>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-around p-4 shadow-2xl">
        <div class="flex flex-col items-center text-[#FFB800]">
            <span class="text-xs font-bold">行程</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <span class="text-xs font-bold">記帳</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <span class="text-xs font-bold">航班/住宿</span>
        </div>
    </nav>
</body>
</html>
